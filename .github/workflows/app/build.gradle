plugins {
    id 'com.android.application'
}

android {
    namespace 'com.ambisonic.frequencymatrix'
    compileSdk 34

    defaultConfig {
        applicationId "com.ambisonic.frequencymatrix"
        minSdk 29
        targetSdk 34
        versionCode 1
        versionName "1.0.0-beta"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

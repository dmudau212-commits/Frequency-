<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMBISONIC // FREQUENCY MATRIX</title>
    <style>
        body {
            background-color: #0a0a0c;
            color: #e4e4e7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            border: 1px solid #27272a;
            padding: 40px;
            border-radius: 12px;
            background: #121214;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h1 {
            color: #fff;
            letter-spacing: 2px;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        p {
            color: #a1a1aa;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background-color: #fff;
            color: #000;
            text-decoration: none;
            padding: 14px 28px;
            font-weight: bold;
            border-radius: 6px;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn:hover {
            transform: scale(1.03);
            background-color: #e4e4e7;
        }
        .badge {
            display: inline-block;
            background: #27272a;
            color: #38bdf8;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-weight: bold;
            text-transform: uppercase;
        }

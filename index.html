<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMBISONIC // FREQUENCY MATRIX</title>
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-card: #121214;
            --border-color: #27272a;
            --accent-glow: #38bdf8;
            --text-primary: #e4e4e7;
            --text-secondary: #a1a1aa;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- HEADER NAVBAR --- */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(18, 18, 20, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* Two-Line Hamburger Menu Icon */
        .menu-trigger {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 10px;
            cursor: pointer;
            z-index: 110;
        }

        .menu-line {
            width: 100%;
            height: 2px;
            background-color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .menu-trigger.active .menu-line:nth-child(1) {
            transform: translateY(4px) rotate(45deg);
        }

        .menu-trigger.active .menu-line:nth-child(2) {
            transform: translateY(-4px) rotate(-45deg);
        }

        .brand-title {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0;
        }

        .status-pill {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-glow);
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            font-weight: bold;
        }

        /* --- SLIDE-OUT CONFIGURATION DRAWER --- */
        .control-drawer {
            position: fixed;
            top: 0;
            left: -320px;
            width: 280px;
            height: 100%;
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            box-shadow: 10px 0 30px rgba(0,0,0,0.7);
            z-index: 105;
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 80px 20px 20px 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .control-drawer.open {
            left: 0;
        }

        .drawer-section {
            margin-bottom: 30px;
        }

        .drawer-section h3 {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            font-size: 0.9rem;
        }

        .setting-value {
            color: var(--accent-glow);
            font-family: monospace;
        }

        .app-list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            font-size: 0.9rem;
        }

        .app-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
        }

        /* --- MAIN SYSTEM MONITOR DASHBOARD --- */
        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        /* Animated Live Audio Equalizer Modules */
        .wave-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
            height: 80px;
            margin: 20px 0;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 10px;
        }

        .wave-bar {
            width: 6px;
            height: 10%;
            background: var(--accent-glow);
            border-radius: 3px;
            animation: bounce 1.2s ease-in-out infinite alternate;
        }

        .wave-bar:nth-child(2n) { animation-duration: 0.7s; }
        .wave-bar:nth-child(3n) { animation-duration: 0.9s; }
        .wave-bar:nth-child(5n) { animation-duration: 1.4s; }

        @keyframes bounce {
            0% { height: 10%; }
            100% { height: 95%; }
        }

        /* Live Scrolling Log Console */
        .console-log {
            background: #050507;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            font-family: monospace;
            font-size: 0.8rem;
            height: 160px;
            overflow-y: hidden;
            color: #34d399;
            line-height: 1.6;
        }

        .console-line {
            margin: 4px 0;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .download-footer {
            text-align: center;
            margin-top: 40px;
        }

        .btn-download {
            display: inline-block;
            background: var(--text-primary);
            color: var(--bg-main);
            text-decoration: none;
            padding: 14px 28px;
            font-weight: bold;
            border-radius: 6px;
            transition: transform 0.2s;
        }
    </style>
</head>
<body>

    <header>
        <div class="menu-trigger" id="menuBtn" onclick="toggleDrawer()">
            <div class="menu-line"></div>
            <div class="menu-line"></div>
        </div>
        <h1 class="brand-title">AMBISONIC</h1>
        <div class="status-pill">CORE ACTIVE</div>
    </header>

    <div class="control-drawer" id="drawer">
        <div class="drawer-section">
            <h3>Matrix Settings</h3>
            <div class="setting-item">
                <span>System Mode</span>
                <span class="setting-value">Dynamic Ducking</span>
            </div>
            <div class="setting-item">
                <span>Frequency Isolation</span>
                <span class="setting-value">500Hz - 2kHz Scoop</span>
            </div>
        </div>

        <div class="drawer-section">
            <h3>Previous Volume Levels</h3>
            <div class="setting-item">
                <span>Media Peak</span>
                <span class="setting-value">84%</span>
            </div>
            <div class="setting-item">
                <span>Background Music</span>
                <span class="setting-value">45%</span>
            </div>
        </div>

        <div class="drawer-section">
            <h3>Connected App Matrix</h3>
            <div class="app-list-item">
                <div class="app-dot"></div>
                <span>Call of Duty: Mobile</span>
            </div>
            <div class="app-list-item">
                <div class="app-dot"></div>
                <span>YouTube Media Service</span>
            </div>
        </div>
    </div>

    <main>
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Frequency Allocation Matrix</h2>
                <span style="font-size: 0.8rem; color: var(--accent-glow); font-family: monospace;">Telemetry Live</span>
            </div>
            
            <div class="wave-container">
                <div class="wave-bar" style="height: 40%"></div>
                <div class="wave-bar" style="height: 70%"></div>
                <div class="wave-bar" style="height: 20%"></div>
                <div class="wave-bar" style="height: 85%"></div>
                <div class="wave-bar" style="height: 50%"></div>
                <div class="wave-bar" style="height: 95%"></div>
                <div class="wave-bar" style="height: 30%"></div>
                <div class="wave-bar" style="height: 60%"></div>
            </div>

            <div class="console-log" id="consoleBox"></div>
        </div>

        <div class="download-footer">
            <a href="#" class="btn-download">DOWNLOAD TEST APK</a>
        </div>
    </main>

    <script>
        function toggleDrawer() {
            const drawer = document.getElementById('drawer');
            const menuBtn = document.getElementById('menuBtn');
            drawer.classList.toggle('open');
            menuBtn.classList.toggle('active');
        }

        const logMessages = [
            "[INFO] Ambisonic Audio Core initialization verified.",
            "[MATRIX] Hooked master hardware system audio output bus successfully.",
            "[ISOLATION] Mid-range dialogue frequencies (500Hz - 2kHz) isolated.",
            "[CONNECT] Target session identified: Call of Duty: Mobile.",
            "[CONNECT] Target session identified: YouTube Media Stream.",
            "[PROCESSING] Dynamic sidechain attenuation activated; music level set to 45%.",
            "[AUDIO] Game dialogue spike detected -> Ducking background music track by -12dB.",
            "[AUDIO] Dialogue pause registered -> Swelling background track seamlessly.",
            "[MONITOR] Device telemetry clear. Matrix framework status: stable 60 FPS."
        ];

        const consoleBox = document.getElementById('consoleBox');

        function appendConsoleLine() {
            if (!consoleBox) return;
            const randomLineText = logMessages[Math.floor(Math.random() * logMessages.length)];
            const timeStamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            const lineElement = document.createElement('div');
            lineElement.className = 'console-line';
            lineElement.innerHTML = `<span style="color: #6b7280;">[${timeStamp}]</span> ${randomLineText}`;
            
            consoleBox.appendChild(lineElement);

            if (consoleBox.children.length > 5) {
                consoleBox.removeChild(consoleBox.children[0]);
            }
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        setInterval(appendConsoleLine, 2000);
        window.onload = function() {
            appendConsoleLine();
            appendConsoleLine();
        };
    </script>
</body>
</html>

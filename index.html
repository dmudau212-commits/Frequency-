<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMBISONIC // FREQUENCY MATRIX</title>
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-card: #121214;
            --border-color: #27272a;
            --accent-glow: #38bdf8;
            --text-primary: #e4e4e7;
            --text-secondary: #a1a1aa;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- TOP HEADER --- */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(18, 18, 20, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* Two-Line Menu Icon (Top Left) */
        .menu-trigger {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 12px;
            cursor: pointer;
            z-index: 110;
        }

        .menu-line {
            width: 100%;
            height: 2px;
            background-color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .menu-trigger.active .menu-line:nth-child(1) {
            transform: translateY(5px) rotate(45deg);
        }

        .menu-trigger.active .menu-line:nth-child(2) {
            transform: translateY(-5px) rotate(-45deg);
        }

        .brand-title {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0;
        }

        .status-pill {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-glow);
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            font-weight: bold;
        }

        /* --- SLIDE-OUT CONTROL DRAWER --- */
        .control-drawer {
            position: fixed;
            top: 0;
            left: -320px;
            width: 280px;
            height: 100%;
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            box-shadow: 10px 0 30px rgba(0,0,0,0.7);
            z-index: 105;
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 80px 20px 20px 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .control-drawer.open {
            left: 0;
        }

        .drawer-section {
            margin-bottom: 30px;
        }

        .drawer-section h3 {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            font-size: 0.9rem;
        }

        .setting-value {
            color: var(--accent-glow);
            font-family: monospace;
        }

        .app-list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            font-size: 0.9rem;
        }

        .app-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
        }

        /* --- MAIN TELEMETRY DASHBOARD --- */
        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        /* Animated Live Audio Waves Visualization */
        .wave-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
            height: 80px;
            margin: 20px 0;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 10px;
        }

        .wave-bar {
            width: 6px;
            height: 10%;
            background: var(--accent-glow);
            border-radius: 3px;
            animation: bounce 1.2s ease-in-out infinite alternate;
        }

        /* Varying animation speeds to simulate actual complex frequencies */
        .wave-bar:nth-child(2n) { animation-duration: 0.7s; }
        .wave-bar:nth-child(3n) { animation-duration: 0.9s; }
        .wave-bar:nth-child(5n) { animation-duration: 1.4s; }

        @keyframes bounce {
            0% { height: 10%; }
            100% { height: 95%; }
        }

        /* Live Activity Console */
        .console-log {
            background: #050507;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            font-family: monospace;
            font-size: 0.8rem;
            height: 150px;
            overflow-y: hidden;
            color: #34d399;
            line-height: 1.6;
        }

        .console-line {
            margin: 4px 0;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .download-footer {
            text-align: center;
            margin-top: 40px;
        }

        .btn-download {
            display: inline-block;
            background: var(--text-primary);
            color: var(--bg-main);
            text-decoration: none;
            padding: 14px 28px;
            font-weight: bold;

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMBISONIC // FREQUENCY MATRIX</title>
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-card: #121214;
            --border-color: #27272a;
            --accent-glow: #38bdf8;
            --text-primary: #e4e4e7;
            --text-secondary: #a1a1aa;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- NAVIGATION TOPBAR --- */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(18, 18, 20, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* Two-Line Hamburger Menu Icon */
        .menu-trigger {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 10px;
            cursor: pointer;
            z-index: 110;
        }

        .menu-line {
            width: 100%;
            height: 2px;
            background-color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .menu-trigger.active .menu-line:nth-child(1) {
            transform: translateY(4px) rotate(45deg);
        }

        .menu-trigger.active .menu-line:nth-child(2) {
            transform: translateY(-4px) rotate(-45deg);
        }

        .brand-title {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0;
        }

        .status-pill {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-glow);
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            font-weight: bold;
        }

        /* --- SLIDE-OUT CONFIGURATION DRAWER --- */
        .control-drawer {
            position: fixed;
            top: 0;
            left: -320px;
            width: 280px;
            height: 100%;
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            box-shadow: 10px 0 30px rgba(0,0,0,0.7);
            z-index: 105;
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 80px 20px 20px 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .control-drawer.open {
            left: 0;
        }

        /* Interactive Backdrop Overlay to intercept taps and close drawer */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 102;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .drawer-overlay.visible {
            display: block;
            opacity: 1;
        }

        .drawer-section {
            margin-bottom: 30px;
        }

        .drawer-section h3 {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            font-size: 0.9rem;
        }

        .setting-value {
            color: var(--accent-glow);
            font-family: monospace;
        }

        /* Dynamic App Matrix Container */
        .app-list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            font-size: 0.9rem;
            animation: slideInApp 0.3s ease forwards;
        }

        @keyframes slideInApp {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .app-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
        }

        .no-apps-msg {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-style: italic;
            padding: 5px 0;
        }

        /* --- MAIN SYSTEM MONITOR DASHBOARD --- */
        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        /* Animated Live Audio Equalizer Modules */
        .wave-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
            height: 80px;
            margin: 20px 0;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 10px;
        }

        .wave-bar {
            width: 6px;
            height: 10%;
            background: var(--accent-glow);
            border-radius: 3px;
            animation: bounce 1.2s ease-in-out infinite alternate;
        }

        .wave-bar:nth-child(2n) { animation-duration: 0.7s; }
        .wave-bar:nth-child(3n) { animation-duration: 0.9s; }
        .wave-bar:nth-child(5n) { animation-duration: 1.4s; }

        @keyframes bounce {
            0% { height: 10%; }
            100% { height: 95%; }
        }

        /* Live Scrolling Log Console */
        .console-log {
            background: #050507;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            font-family: monospace;
            font-size: 0.8rem;
            height: 160px;
            overflow-y: hidden;
            color: #34d399;
            line-height: 1.6;
        }

        .console-line {
            margin: 4px 0;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .download-footer {
            text-align: center;
            margin-top: 40px;
        }

        .btn-download {
            display: inline-block;
            background: var(--text-primary);
            color: var(--bg-main);
            text-decoration: none;
            padding: 14px 28px;
            font-weight: bold;
            border-radius: 6px;
            transition: transform 0.2s;
        }
    </style>
</head>
<body>

    <div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>

    <header>
        <div class="menu-trigger" id="menuBtn" onclick="toggleDrawer()">
            <div class="menu-line"></div>
            <div class="menu-line"></div>
        </div>
        <h1 class="brand-title">AMBISONIC</h1>
        <div class="status-pill">CORE ACTIVE</div>
    </header>

    <div class="control-drawer" id="drawer">
        <div class="drawer-section">
            <h3>Matrix Settings</h3>
            <div class="setting-item">
                <span>System Mode</span>
                <span class="setting-value">Dynamic Ducking</span>
            </div>
            <div class="setting-item">
                <span>Frequency Isolation</span>
                <span class="setting-value">500Hz - 2kHz Scoop</span>
            </div>
        </div>

        <div class="drawer-section">
            <h3>Previous Volume Levels</h3>
            <div class="setting-item">
                <span>Media Peak</span>
                <span class="setting-value">84%</span>
            </div>
            <div class="setting-item">
                <span>Background Music</span>
                <span class="setting-value">45%</span>
            </div>
        </div>

        <div class="drawer-section">
            <h3>Recent Synced Apps</h3>
            <div id="dynamicAppContainer">
                <div class="no-apps-msg" id="emptyMsg">Waiting for system sync link...</div>
            </div>
        </div>
    </div>

    <main>
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Frequency Allocation Matrix</h2>
                <span style="font-size: 0.8rem; color: var(--accent-glow); font-family: monospace;">Telemetry Live</span>
            </div>
            
            <div class="wave-container">
                <div class="wave-bar" style="height: 40%"></div>
                <div class="wave-bar" style="height: 70%"></div>
                <div class="wave-bar" style="height: 20%"></div>
                <div class="wave-bar" style="height: 85%"></div>
                <div class="wave-bar" style="height: 50%"></div>
                <div class="wave-bar" style="height: 95%"></div>
                <div class="wave-bar" style="height: 30%"></div>
                <div class="wave-bar" style="height: 60%"></div>
            </div>

            <div class="console-log" id="consoleBox"></div>
        </div>

        <div class="download-footer">
            <a href="#" class="btn-download">DOWNLOAD TEST APK</a>
        </div>
    </main>

    <script>
        const drawer = document.getElementById('drawer');
        const menuBtn = document.getElementById('menuBtn');
        const overlay = document.getElementById('overlay');
        const dynamicAppContainer = document.getElementById('dynamicAppContainer');
        const emptyMsg = document.getElementById('emptyMsg');

        // Track verified synced apps so duplicates aren't added
        const detectedApps = new Set();

        // Dual Action Trigger
        function toggleDrawer() {
            const isOpen = drawer.classList.contains('open');
            if (isOpen) {
                closeDrawer();
            } else {
                openDrawer();
            }
        }

        function openDrawer() {
            drawer.classList.add('open');
            menuBtn.classList.add('active');
            overlay.classList.add('visible');
        }

        function closeDrawer() {
            drawer.classList.remove('open');
            menuBtn.classList.remove('active');
            overlay.classList.remove('visible');
        }

        // Master log streams with target app identifiers inside brackets
        const logMessages = [
            { text: "[INFO] Ambisonic Audio Core initialization verified.", app: null },
            { text: "[MATRIX] Hooked master hardware system audio output bus successfully.", app: null },
            { text: "[CONNECT] Target session identified: [Call of Duty: Mobile]", app: "Call of Duty: Mobile" },
            { text: "[CONNECT] Target session identified: [YouTube Media Stream]", app: "YouTube Media Stream" },
            { text: "[CONNECT] Target session identified: [Genshin Impact]", app: "Genshin Impact" },
            { text: "[PROCESSING] Dynamic sidechain attenuation activated; music level set to 45%.", app: null },
            { text: "[AUDIO] Audio frequency spike detected -> Ducking background track by -12dB.", app: null },
            { text: "[AUDIO] Dialogue pause registered -> Swelling background track seamlessly.", app: null },
            { text: "[MONITOR] Device telemetry clear. Matrix framework status: stable 60 FPS.", app: null }
        ];

        const consoleBox = document.getElementById('consoleBox');

        // Dynamically append new apps to the panel layout when they appear in logs
        function syncNewApp(appName) {
            if (!appName || detectedApps.has(appName)) return;

            detectedApps.add(appName);

            // Wipe out the initial "Waiting..." text on first detection
            if (emptyMsg) {
                emptyMsg.remove();
            }

            const appRow = document.createElement('div');
            appRow.className = 'app-list-item';
            appRow.innerHTML = `
                <div class="app-dot"></div>
                <span>${appName}</span>
            `;
            dynamicAppContainer.appendChild(appRow);
        }

        function appendConsoleLine() {
            if (!consoleBox) return;
            
            const logObj = logMessages[Math.floor(Math.random() * logMessages.length)];
            const timeStamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            const lineElement = document.createElement('div');
            lineElement.className = 'console-line';
            lineElement.innerHTML = `<span style="color: #6b7280;">[${timeStamp}]</span> ${logObj.text}`;
            
            consoleBox.appendChild(lineElement);

            // If this log contains an app sync connection, pass it to the list builder
            if (logObj.app) {
                syncNewApp(logObj.app);
            }

            if (consoleBox.children.length > 5) {
                consoleBox.removeChild(consoleBox.children[0]);
            }
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        setInterval(appendConsoleLine, 2200);
        window.onload = function() {
            appendConsoleLine();
            appendConsoleLine();
        };
    </script>
</body>
</html>
